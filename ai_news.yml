name: Daily AI News
on:
  schedule:
    - cron: '0 1 * * *' # 每天早上9点触发 (UTC时间转换)
  workflow_dispatch: # 支持手动点击运行测试

jobs:
  push_news:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Push
        shell: python
        run: |
          import feedparser, requests, json
          # 1. 配置 RSS 和 钉钉地址
          RSS_URL = "https://rsshub.app/jiqizhixin/category/1"
          # 替换下方为你的钉钉地址
          DET_URL = "${{ secrets.DINGTALK_TOKEN }}" 
          
          feed = feedparser.parse(RSS_URL)
          md_text = "### [AI] 每日行业动态\n\n"
          for entry in feed.entries[:5]: # 取前5条
              md_text += f"**{entry.title}**\n\n{entry.summary[:80]}...\n\n[详情]({entry.link})\n\n---\n"
          
          data = {"msgtype": "markdown", "markdown": {"title":"AI新闻", "text": md_text}}
          requests.post(DET_URL, json=data)
