name: Daily AI News
on:
  schedule:
    - cron: '0 1 * * *' # 每天早上9点触发 (UTC时间转换)
  workflow_dispatch: # 支持手动点击运行测试

jobs:
  push_rss:
    runs-on: ubuntu-latest
    # 必须赋予写权限，否则无法更新 last_id.txt
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install feedparser requests

      - name: Execute Pusher
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python -u rss_pusher.py 2>&1

      - name: Save State
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_id.txt
          git commit -m "chore: update rss state [skip ci]" || exit 0
          git push
